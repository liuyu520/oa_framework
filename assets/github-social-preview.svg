<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">oa_framework GitHub Social Preview</title>
  <desc id="desc">A GitHub social preview card for oa_framework, a SpringMVC generic controller framework.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8ef" />
      <stop offset="55%" stop-color="#fff1e2" />
      <stop offset="100%" stop-color="#ffe7d2" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9b4a" />
      <stop offset="100%" stop-color="#c85a12" />
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.96" />
      <stop offset="100%" stop-color="#fff8f1" stop-opacity="0.92" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.18" />
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#c85a12" flood-opacity="0.14" />
    </filter>
    <style>
      .title {
        font-family: Arial, "Helvetica Neue", sans-serif;
        font-size: 72px;
        font-weight: 800;
        fill: #1b1b1b;
      }
      .subtitle {
        font-family: "Helvetica Neue", Arial, sans-serif;
        font-size: 34px;
        font-weight: 800;
        fill: #c85a12;
      }
      .body {
        font-family: "Helvetica Neue", Arial, sans-serif;
        font-size: 21px;
        fill: #242424;
      }
      .muted {
        font-family: "Helvetica Neue", Arial, sans-serif;
        font-size: 17px;
        fill: #6d4b31;
      }
      .feature {
        font-family: "Helvetica Neue", Arial, sans-serif;
        font-size: 22px;
        font-weight: 700;
        fill: #1f1f1f;
      }
      .small {
        font-family: Menlo, Consolas, monospace;
        font-size: 17px;
        fill: #7a4d2c;
      }
      .diagram-label {
        font-family: "Helvetica Neue", Arial, sans-serif;
        font-size: 15px;
        font-weight: 700;
        fill: #ffffff;
      }
      .diagram-note {
        font-family: "Helvetica Neue", Arial, sans-serif;
        font-size: 13px;
        font-weight: 700;
        fill: #7d4c22;
      }
    </style>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)" />
  <circle cx="184" cy="92" r="138" fill="#ffd2ab" opacity="0.22" />
  <circle cx="1092" cy="560" r="168" fill="#ffc38d" opacity="0.18" />
  <circle cx="1018" cy="118" r="76" fill="#ffe0c2" opacity="0.45" />

