    <circle cx="80" cy="212" r="2.6" />
    <circle cx="92" cy="212" r="2.6" />
    <circle cx="104" cy="212" r="2.6" />
    <circle cx="68" cy="224" r="2.6" />
    <circle cx="80" cy="224" r="2.6" />
    <circle cx="92" cy="224" r="2.6" />
    <circle cx="104" cy="224" r="2.6" />
    <circle cx="68" cy="236" r="2.6" />
