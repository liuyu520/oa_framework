    <path d="M18 126h72l26-24h84" />
    <path d="M1196 84h54l12 12h18" />
    <path d="M1146 126h64l20 20h50" />
    <path d="M1064 58h56l18-18h76" />
    <circle cx="34" cy="126" r="5" fill="#efb785" stroke="none" />
